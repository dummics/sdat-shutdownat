name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - name: Parse PowerShell sources
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count) { $failed = $true; $errors | ForEach-Object { Write-Error "$($_.Extent.File): $($_.Message)" } }
          }
          if ($failed) { exit 1 }
      - name: Run SDAT self-tests
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./shutdownat.ps1 -SelfTest -DryRun
