name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Parse PowerShell sources
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count) { $failed = $true; $errors | ForEach-Object { Write-Error "$($_.Extent.File): $($_.Message)" } }
          }
          if ($failed) { exit 1 }
      - name: Restore native solution
        run: dotnet restore SDAT.slnx
      - name: Test native core
        run: dotnet test tests/Sdat.Core.Tests/Sdat.Core.Tests.csproj -c Release --no-restore
      - name: Test Windows integration
        run: dotnet test tests/Sdat.Windows.Tests/Sdat.Windows.Tests.csproj -c Release --no-restore
      - name: Build WinUI companion
        run: dotnet build src/Sdat.App/Sdat.App.csproj -c Release --no-restore
      - name: Build release package
        shell: pwsh
        run: pwsh -NoProfile -File ./tools/Build-Package.ps1 -OutputDir ./artifacts
      - name: Install Windows App SDK runtime for GUI smoke test
        shell: pwsh
        run: |
          [xml]$versions = Get-Content ./Directory.Packages.props -Raw
          $runtimeVersion = @($versions.Project.ItemGroup.PackageVersion |
            Where-Object Include -eq 'Microsoft.WindowsAppSDK.Runtime')[0].Version
          $parsedVersion = [version]$runtimeVersion
          $runtimeUri = 'https://aka.ms/windowsappsdk/{0}.{1}/{0}.{1}.{2}/windowsappruntimeinstall-x64.exe' -f `
            $parsedVersion.Major, $parsedVersion.Minor, $parsedVersion.Build
          $installer = Join-Path $env:RUNNER_TEMP 'WindowsAppRuntimeInstall-x64.exe'
          Invoke-WebRequest `
            -Uri $runtimeUri `
            -OutFile $installer `
            -UseBasicParsing
          $signature = Get-AuthenticodeSignature -FilePath $installer
          $publisher = $signature.SignerCertificate.GetNameInfo(
            [Security.Cryptography.X509Certificates.X509NameType]::SimpleName,
            $false)
          if ($signature.Status -ne 'Valid' -or $publisher -cne 'Microsoft Corporation') {
            throw 'Windows App SDK runtime installer signature validation failed.'
          }
          $process = Start-Process -FilePath $installer -ArgumentList '--quiet' -Wait -PassThru
          if ($process.ExitCode -notin @(0, 3010)) {
            throw "Windows App SDK runtime installer failed with exit code $($process.ExitCode)."
          }
      - name: Verify packaged install and update
        timeout-minutes: 5
        shell: pwsh
        run: |
          $package = Get-ChildItem ./artifacts/sdat-v*-windows.zip | Select-Object -First 1
          Expand-Archive -LiteralPath $package.FullName -DestinationPath ./package-test
          pwsh -NoProfile -File ./tools/Test-Package.ps1 -PackageRoot ./package-test -SmokeTestGuiBootstrap
      - uses: actions/upload-artifact@v7
        with:
          name: sdat-windows-package
          path: artifacts/*
