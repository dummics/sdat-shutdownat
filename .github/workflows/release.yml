name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Validate version tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ($env:GITHUB_REF_NAME -ne "v$version") { throw "Tag $env:GITHUB_REF_NAME does not match VERSION $version" }
      - name: Restore native solution
        run: dotnet restore SDAT.slnx
      - name: Run native tests
        run: dotnet test SDAT.slnx -c Release --no-restore
      - name: Build Windows package
        shell: pwsh
        run: ./tools/Build-Package.ps1 | Format-List
      - name: Verify packaged install and update
        shell: pwsh
        run: |
          $package = Get-ChildItem ./dist/sdat-v*-windows.zip | Select-Object -First 1
          Expand-Archive -LiteralPath $package.FullName -DestinationPath ./package-test
          ./tools/Test-Package.ps1 -PackageRoot ./package-test
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME ./dist/* --title "SDAT $env:GITHUB_REF_NAME" --generate-notes
