name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Validate version tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ($env:GITHUB_REF_NAME -ne "v$version") { throw "Tag $env:GITHUB_REF_NAME does not match VERSION $version" }
      - name: Run SDAT self-tests
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./shutdownat.ps1 -SelfTest -DryRun
      - name: Build Windows package
        shell: pwsh
        run: ./tools/Build-Package.ps1 | Format-List
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME ./dist/* --title "SDAT $env:GITHUB_REF_NAME" --generate-notes
